global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: kubeguardian
    static_configs:
      # controller:8000 when all services run via docker compose
      # host.docker.internal:8000 when the controller runs on the host (recommended for kind)
      - targets:
          - controller:8000
          - host.docker.internal:8000
    metrics_path: /metrics
