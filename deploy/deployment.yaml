apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeguardian
  namespace: default
  labels:
    app.kubernetes.io/name: kubeguardian
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeguardian
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeguardian
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: kubeguardian
      containers:
        - name: controller
          image: kubeguardian:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 8000
          env:
            - name: METRICS_PORT
              value: "8000"
            - name: PENDING_THRESHOLD_SECONDS
              value: "60"
            - name: HEAL_COOLDOWN_SECONDS
              value: "120"
            - name: INCIDENT_LOG_PATH
              value: /var/log/kubeguardian/incidents.jsonl
          volumeMounts:
            - name: incident-log
              mountPath: /var/log/kubeguardian
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: incident-log
          emptyDir: {}
